<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Film strip / clapper motif -->
  <g transform="translate(256,240)">
    <!-- Scissors / clip shape -->
    <circle cx="-40" cy="-30" r="38" fill="none" stroke="#1D8CD7" stroke-width="14"/>
    <circle cx="40" cy="-30" r="38" fill="none" stroke="#1D8CD7" stroke-width="14"/>
    <line x1="-10" y1="8" x2="60" y2="110" stroke="#1D8CD7" stroke-width="14" stroke-linecap="round"/>
    <line x1="10" y1="8" x2="-60" y2="110" stroke="#1D8CD7" stroke-width="14" stroke-linecap="round"/>
  </g>
  <!-- Chess piece (pawn) silhouette -->
  <g transform="translate(256,130)" fill="#e0e0e0">
    <circle cx="0" cy="-20" r="18"/>
    <path d="M-12,-2 Q-20,15 -16,25 L16,25 Q20,15 12,-2 Z"/>
    <rect x="-20" y="25" width="40" height="8" rx="3"/>
  </g>
  <!-- "CLIPPER" text -->
  <text x="256" y="420" text-anchor="middle" font-family="system-ui,Helvetica,Arial,sans-serif" font-weight="700" font-size="52" fill="#ffffff" letter-spacing="8">CLIPPER</text>
</svg>
